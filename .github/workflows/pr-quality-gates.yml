name: PR Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ui]" pytest
      - name: pytest passes
        run: python -m pytest -q tests

  line-coverage:
    name: Line Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and coverage tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ui]" pytest pytest-cov coverage[toml]
      - name: 100% line coverage
        run: python -m pytest -q --cov=aethermesh_core --cov-report=term-missing --cov-fail-under=100 tests

  branch-coverage:
    name: Branch Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and coverage tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ui]" pytest pytest-cov coverage[toml]
      - name: 100% branch coverage
        run: python -m pytest -q --cov=aethermesh_core --cov-branch --cov-report=term-missing --cov-fail-under=100 tests

  ruff-check:
    name: Ruff Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: python -m pip install --upgrade ruff
      - name: ruff check passes
        run: ruff check src tests scripts

  ruff-format:
    name: Ruff Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: python -m pip install --upgrade ruff
      - name: ruff format check passes
        run: ruff format --check src tests scripts

  strict-type-check:
    name: Strict Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and mypy
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ui]" mypy
      - name: mypy strict passes
        run: mypy --strict src scripts

  desktop-tests:
    name: Desktop Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: install desktop dependencies
        run: npm install
      - name: desktop bootstrap tests pass
        run: npm run test:desktop

  desktop-runtime-sidecar:
    name: Desktop Runtime Sidecar
    runs-on: ubuntu-latest
    env:
      AETHERMESH_TARGET_PLATFORM: linux
      AETHERMESH_TARGET_ARCH: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: install runtime build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ui]" pyinstaller
      - name: install desktop dependencies
        run: npm install
      - name: build runtime sidecar
        run: npm run runtime:build
      - name: runtime sidecar responds
        run: dist/runtime/linux-x64/aethermesh-node --help

  duplicate-code:
    name: Duplicate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: duplicate code check passes
        run: npx --yes jscpd@5.0.11 src --format python --threshold 0 --reporters console --ignore "**/__pycache__/**" --no-tips

  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install radon
        run: python -m pip install --upgrade radon
      - name: complexity check passes
        run: radon cc src tests -s -n E

  dead-code:
    name: Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install vulture
        run: python -m pip install --upgrade vulture
      - name: dead code check passes
        run: vulture src tests --min-confidence 100

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install bandit
        run: python -m pip install --upgrade bandit
      - name: bandit security scan passes
        run: bandit -q -r src

  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip-audit
      - name: pip-audit passes
        run: python scripts/ci_quality_gates.py dependency-audit

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: no secrets detected
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          "$HOME/go/bin/gitleaks" detect --no-banner --source . --redact --verbose

  test-integrity:
    name: Test Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: no unjustified skip/xfail/type-ignore/noqa/coverage-ignore
        run: python scripts/ci_quality_gates.py test-integrity

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: no new dependency without justification
        run: |
          git fetch origin "${GITHUB_BASE_REF:-main}" --depth=1
          python scripts/ci_quality_gates.py dependency-review --base "origin/${GITHUB_BASE_REF:-main}"

  build-install:
    name: Build Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install from scratch and smoke test
        run: |
          python -m venv /tmp/aethermesh-install-check
          /tmp/aethermesh-install-check/bin/python -m pip install --upgrade pip
          /tmp/aethermesh-install-check/bin/python -m pip install --force-reinstall dist/*.whl
          /tmp/aethermesh-install-check/bin/aethermesh-core --help

  python-workflow-security-check:
    name: Python - Workflow Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: workflow security check passes
        run: python scripts/ci_quality_gates.py workflow-security

  python-pr-size-check:
    name: Python - PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: PR size stays reviewable
        run: |
          git fetch origin "${GITHUB_BASE_REF:-main}" --depth=1
          python scripts/ci_quality_gates.py pr-size --base "origin/${GITHUB_BASE_REF:-main}" --max-files 80 --max-lines 10000 --max-binary-files 0 --exclude-path-prefix graphify-out/ --exclude-path-prefix wordlists/node-names/

  python-flaky-test-check:
    name: Python - Flaky Test Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ui]" pytest
      - name: repeated pytest passes
        run: |
          for seed in 1 2 3; do
            echo "Flaky-test pass with PYTHONHASHSEED=${seed}"
            PYTHONHASHSEED="${seed}" python -m pytest -q tests
          done

  python-artifact-provenance-check:
    name: Python - Artifact Provenance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build artifacts from source
        run: |
          python -m pip install --upgrade pip build
          rm -rf dist build *.egg-info src/*.egg-info
          python -m build
      - name: Verify artifact provenance metadata
        run: python scripts/ci_quality_gates.py artifact-provenance --dist dist
