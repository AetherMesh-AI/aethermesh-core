name: Desktop Build and Numbered Prerelease

on:
  push:
    branches: [main]
  schedule:
    # GitHub cron is UTC. Running both possible UTC hours and gating on New York
    # local time below keeps this at Monday 10:00 through DST transitions.
    - cron: '0 14 * * 1'
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Exact commit, tag, or ref reachable from main (defaults to main)
        required: false
        default: main
        type: string
      publish_release:
        description: Promote the validated build to the next numbered prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  checks: read
  statuses: read

env:
  RELEASE_VERSION: 0.2.0-alpha

jobs:
  resolve:
    name: Resolve and authorize build ref
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      run_build: ${{ steps.resolve.outputs.run_build }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Resolve event policy
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_REF: ${{ inputs.release_ref || 'main' }}
          REQUESTED_PUBLISH: ${{ inputs.publish_release || false }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          target_sha="$(git rev-parse origin/main^{commit})"
          run_build=true
          publish=false

          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            ref="$REQUESTED_REF"
            if [[ ! "$ref" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]*$ ]]; then
              echo "unsafe release_ref" >&2
              exit 1
            fi
            target_sha="$(git rev-parse --verify "${ref}^{commit}" 2>/dev/null || git rev-parse --verify "origin/${ref}^{commit}")"
            git merge-base --is-ancestor "$target_sha" origin/main || {
              echo "manual ref must resolve to a commit reachable from main" >&2
              exit 1
            }
            if [ "$REQUESTED_PUBLISH" = true ]; then
              publish=true
              gh api "repos/${GITHUB_REPOSITORY}/branches/main/protection/required_status_checks" > required.json
              gh api "repos/${GITHUB_REPOSITORY}/commits/${target_sha}/check-runs?per_page=100" > check-runs.json
              gh api "repos/${GITHUB_REPOSITORY}/commits/${target_sha}/status" > statuses.json
              python scripts/release_policy.py verify-checks --required required.json \
                --check-runs check-runs.json --statuses statuses.json
            fi
          elif [ "$GITHUB_EVENT_NAME" = schedule ]; then
            if [ "$(TZ=America/New_York date '+%u %H:%M')" != "1 10:00" ]; then
              echo "Companion DST cron is outside Monday 10:00 America/New_York; skipping."
              run_build=false
            else
              release_tags="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
                --jq '.[] | select(.draft == false) | .tag_name')"
              previous_tag="$(printf '%s\n' "$release_tags" | python scripts/release_policy.py latest-tag)"
              if [ -n "$previous_tag" ] && [ "$(git rev-list --count "${previous_tag}..${target_sha}")" = 0 ]; then
                echo "No commits since ${previous_tag}; weekly build and publication skipped."
                run_build=false
              else
                publish=true
              fi
            fi
          fi

          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"
          echo "run_build=${run_build}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

  desktop-build:
    name: Desktop ${{ matrix.name }}
    needs: resolve
    if: needs.resolve.outputs.run_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            target_platform: darwin
            target_arch: arm64
            electron_platform: mac
            electron_arch_flag: --arm64
          - name: Windows x64
            os: windows-latest
            target_platform: win32
            target_arch: x64
            electron_platform: win
            electron_arch_flag: --x64
          - name: Linux x64
            os: ubuntu-24.04
            target_platform: linux
            target_arch: x64
            electron_platform: linux
            electron_arch_flag: --x64
          - name: Linux arm64
            os: ubuntu-24.04-arm
            target_platform: linux
            target_arch: arm64
            electron_platform: linux
            electron_arch_flag: --arm64
    env:
      AETHERMESH_TARGET_PLATFORM: ${{ matrix.target_platform }}
      AETHERMESH_TARGET_ARCH: ${{ matrix.target_arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.target_sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python runtime build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ui]" pyinstaller
      - name: Install desktop dependencies
        run: npm install
      - name: Run desktop tests
        run: npm run test:desktop
      - name: Build AetherMesh runtime sidecar
        run: npm run runtime:build
      - name: Copy runtime sidecar into Electron resources
        run: npm run runtime:copy
      - name: Build desktop installer
        run: npx electron-builder --config desktop/electron-builder.json --${{ matrix.electron_platform }} ${{ matrix.electron_arch_flag }} --publish never
      - name: Stage desktop artifact
        shell: bash
        run: |
          mkdir -p dist/release-upload
          case "${AETHERMESH_TARGET_PLATFORM}" in
            darwin) artifact=$(find dist/desktop -maxdepth 1 -type f -name '*.dmg' | head -n 1); artifact_system=MacOS; artifact_extension=dmg ;;
            win32) artifact=$(find dist/desktop -maxdepth 1 -type f -name '*.exe' | head -n 1); artifact_system=Windows; artifact_extension=exe ;;
            linux) artifact=$(find dist/desktop -maxdepth 1 -type f -name '*.deb' | head -n 1); artifact_system=Linux; artifact_extension=deb ;;
            *) echo "unsupported target platform: ${AETHERMESH_TARGET_PLATFORM}" >&2; exit 1 ;;
          esac
          if [ -z "$artifact" ]; then
            echo "missing desktop artifact for ${AETHERMESH_TARGET_PLATFORM}-${AETHERMESH_TARGET_ARCH}" >&2
            find dist/desktop -maxdepth 1 -type f -print >&2
            exit 1
          fi
          release_asset="dist/release-upload/AetherMesh-${RELEASE_VERSION}-${artifact_system}-${AETHERMESH_TARGET_ARCH}.${artifact_extension}"
          cp "$artifact" "$release_asset"
          test "$(find dist/release-upload -type f | wc -l | tr -d ' ')" = 1
      - name: Upload temporary workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aethermesh-desktop-${{ matrix.target_platform }}-${{ matrix.target_arch }}
          path: dist/release-upload/*
          retention-days: 14
          if-no-files-found: error

  publish-weekly:
    name: Publish weekly prerelease
    needs: [resolve, desktop-build]
    if: github.event_name == 'schedule' && needs.resolve.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: desktop-numbered-prerelease
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.target_sha }}
      - uses: actions/checkout@v4
        with:
          path: .tooling
      - uses: actions/download-artifact@v4
        with:
          pattern: aethermesh-desktop-*
          path: dist/publish
      - uses: ./.tooling/.github/actions/publish-prerelease
        with:
          target_sha: ${{ needs.resolve.outputs.target_sha }}
          mode: scheduled

  publish-manual:
    name: Publish manually promoted prerelease
    needs: [resolve, desktop-build]
    if: github.event_name == 'workflow_dispatch' && needs.resolve.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    concurrency:
      group: desktop-numbered-prerelease
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.target_sha }}
      - uses: actions/checkout@v4
        with:
          path: .tooling
      - uses: actions/download-artifact@v4
        with:
          pattern: aethermesh-desktop-*
          path: dist/publish
      - uses: ./.tooling/.github/actions/publish-prerelease
        with:
          target_sha: ${{ needs.resolve.outputs.target_sha }}
          mode: manual
