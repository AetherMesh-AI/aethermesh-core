name: Desktop Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_VERSION: 0.2.0-alpha

jobs:
  prepare-release:
    name: Prepare GitHub release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create release source archive
        run: |
          mkdir -p dist/source
          git archive --format=tar.gz --prefix=aethermesh-${RELEASE_VERSION}/ -o dist/source/aethermesh-${RELEASE_VERSION}-source.tar.gz "${{ github.sha }}"
      - name: Prepare release metadata
        id: metadata
        run: python scripts/release_metadata.py prepare --release-version "$RELEASE_VERSION" --source-archive "dist/source/aethermesh-${RELEASE_VERSION}-source.tar.gz" --notes-path release-notes.md
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file release-notes.md --target "${{ github.sha }}" --latest
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file release-notes.md --target "${{ github.sha }}" --latest
          fi
          find dist/source -type f -print0 | xargs -0 gh release upload "$RELEASE_TAG" --clobber
      - name: Upload source archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: aethermesh-source
          path: dist/source/aethermesh-0.2.0-alpha-source.tar.gz

  desktop-build:
    name: Desktop ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            target_platform: darwin
            target_arch: arm64
            electron_platform: mac
            electron_arch_flag: --arm64
          - name: Windows x64
            os: windows-latest
            target_platform: win32
            target_arch: x64
            electron_platform: win
            electron_arch_flag: --x64
          - name: Linux x64
            os: ubuntu-24.04
            target_platform: linux
            target_arch: x64
            electron_platform: linux
            electron_arch_flag: --x64
          - name: Linux arm64
            os: ubuntu-24.04-arm
            target_platform: linux
            target_arch: arm64
            electron_platform: linux
            electron_arch_flag: --arm64
    env:
      AETHERMESH_TARGET_PLATFORM: ${{ matrix.target_platform }}
      AETHERMESH_TARGET_ARCH: ${{ matrix.target_arch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python runtime build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ui]" pyinstaller
      - name: Install desktop dependencies
        run: npm install
      - name: Run desktop tests
        run: npm run test:desktop
      - name: Build AetherMesh runtime sidecar
        run: npm run runtime:build
      - name: Copy runtime sidecar into Electron resources
        run: npm run runtime:copy
      - name: Build desktop installer
        run: npx electron-builder --config desktop/electron-builder.json --${{ matrix.electron_platform }} ${{ matrix.electron_arch_flag }} --publish never
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aethermesh-desktop-${{ matrix.target_platform }}-${{ matrix.target_arch }}
          path: |
            dist/desktop/**
            dist/runtime/**
      - name: Attach artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        shell: bash
        run: |
          {
            find dist/desktop -maxdepth 1 -type f -print0
            find "dist/runtime/${AETHERMESH_TARGET_PLATFORM}-${AETHERMESH_TARGET_ARCH}" -maxdepth 1 -type f -print0
          } | xargs -0 gh release upload "$RELEASE_TAG" --clobber
