name: Main Alpha Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Publish 0.1.1-alpha
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare release metadata
        id: metadata
        run: python scripts/release_metadata.py prepare --release-version 0.1.1-alpha --notes-path release-notes.md

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Write artifact checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file release-notes.md --target "$GITHUB_SHA"
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_NAME" --notes-file release-notes.md --target "$GITHUB_SHA"
          fi
