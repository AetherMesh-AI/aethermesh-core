name: Main Alpha Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Publish 0.2.0-alpha
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create release source archive
        run: |
          mkdir -p dist/source
          git archive --format=tar.gz --prefix=aethermesh-0.2.0-alpha/ -o dist/source/aethermesh-0.2.0-alpha-source.tar.gz "$GITHUB_SHA"

      - name: Prepare release metadata
        id: metadata
        run: python scripts/release_metadata.py prepare --release-version 0.2.0-alpha --source-archive dist/source/aethermesh-0.2.0-alpha-source.tar.gz --notes-path release-notes.md

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Write artifact checksums
        run: |
          cd dist
          find . -maxdepth 2 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file release-notes.md --target "$GITHUB_SHA" --latest
            gh release upload "$RELEASE_TAG" dist/* dist/source/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* dist/source/* --title "$RELEASE_NAME" --notes-file release-notes.md --target "$GITHUB_SHA" --latest
          fi
