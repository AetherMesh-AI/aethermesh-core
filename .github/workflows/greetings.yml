name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    name: Greet First-Time Contributors
    runs-on: ubuntu-latest

    steps:
      - name: Welcome first-time contributors
        uses: actions/first-interaction@v3
        with:
          issue_message: |
            Thanks for opening your first issue! We appreciate you taking the
            time to help improve the project.

          pr_message: |
            Thanks for opening your first pull request! We appreciate your
            contribution and will review it as soon as possible.
