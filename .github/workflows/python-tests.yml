name: Python tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python tests with 100% coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and coverage tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . coverage[toml]

      - name: Run all Python tests with coverage
        run: |
          PYTHONDONTWRITEBYTECODE=1 coverage run -m unittest discover -s tests -p 'test*.py' -v
          coverage report --show-missing --fail-under=100
