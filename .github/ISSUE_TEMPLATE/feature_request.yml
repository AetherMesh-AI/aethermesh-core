name: Feature request
description: Propose a small, testable capability for the AetherMesh prototype.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        AetherMesh grows best through small, validated steps toward runnable node/work/routing behavior. Please avoid tokenomics, dashboards, and broad rewrites unless the issue explains the immediate prototype value.
  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      description: What should be added or improved?
      placeholder: Add support for ...
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why this matters
      description: Explain how this moves the local prototype toward nodes, work assignment, validation, contribution tracking, routing, or AER.
    validations:
      required: true
  - type: dropdown
    id: prototype_value
    attributes:
      label: Prototype value
      multiple: true
      options:
        - makes the project easier to run
        - improves node identity or lifecycle
        - improves local communication/transport
        - adds or improves useful work execution
        - improves result validation
        - improves contribution accounting/auditability
        - improves capability advertisement
        - improves routing toward AER
        - improves expert/validator/aggregator foundations
        - improves packaging/release/update flow
        - improves desktop/local UX without replacing core behavior
        - improves tests/CI/quality gates
        - improves documentation/onboarding
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful implementation shape.
      placeholder: |
        Add ...
        Keep it local-only by ...
        Validate it with ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that prove the feature works.
      placeholder: |
        - [ ] Command ... returns ...
        - [ ] Tests cover ...
        - [ ] Docs mention ...
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals and constraints
      description: Name what this should not do yet.
      placeholder: No tokenomics, public networking, production consensus, or dashboard-first work.
    validations:
      required: false
