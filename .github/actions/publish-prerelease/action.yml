name: Publish numbered prerelease
description: Re-check the shared sequence and atomically create an immutable prerelease
inputs:
  target_sha:
    required: true
    description: Exact validated commit to publish
  mode:
    required: true
    description: scheduled or manual
runs:
  using: composite
  steps:
    - name: Re-check sequence and publish
      shell: bash
      env:
        TARGET_SHA: ${{ inputs.target_sha }}
        RELEASE_MODE: ${{ inputs.mode }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        git fetch --no-tags origin main
        git fetch --no-tags origin '+refs/tags/v0.2.0-alpha.*:refs/tags/v0.2.0-alpha.*'

        remote_tags="$(git ls-remote --tags origin 'refs/tags/v0.2.0-alpha.*' | while read -r _ ref; do
          tag="${ref#refs/tags/}"
          printf '%s\n' "${tag%^{}}"
        done | sort -u)"
        release_tags="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
          --jq '.[] | select(.draft == false) | .tag_name')"
        all_tags="$(printf '%s\n%s\n' "$remote_tags" "$release_tags")"
        build_number="$(printf '%s\n' "$all_tags" | python .tooling/scripts/release_policy.py next-build)"
        previous_tag="$(printf '%s\n' "$release_tags" | python .tooling/scripts/release_policy.py latest-tag)"
        release_tag="v${RELEASE_VERSION}.${build_number}"

        # This serialized job owns the candidate only while publishing. Never move a tag.
        if printf '%s\n' "$all_tags" | grep -Fqx "$release_tag"; then
          echo "candidate tag appeared during publication: ${release_tag}" >&2
          exit 1
        fi
        if [ -n "$previous_tag" ]; then
          git merge-base --is-ancestor "$previous_tag" "$TARGET_SHA" || {
            echo "target is not newer than ${previous_tag}" >&2
            exit 1
          }
          if [ "$(git rev-list --count "${previous_tag}..${TARGET_SHA}")" = 0 ]; then
            if [ "$RELEASE_MODE" = scheduled ]; then
              echo "No commits since ${previous_tag}; weekly publication skipped."
              exit 0
            fi
            echo "manual target has no commits since ${previous_tag}" >&2
            exit 1
          fi
        fi

        mkdir -p dist/source
        source_archive="dist/source/aethermesh-${RELEASE_VERSION}-source.tar.gz"
        git archive --format=tar.gz --prefix="aethermesh-${RELEASE_VERSION}/" \
          -o "$source_archive" "$TARGET_SHA"
        metadata_args=(prepare --release-version "$RELEASE_VERSION" \
          --build-number "$build_number" --source-archive "$source_archive" \
          --notes-path release-notes.md)
        if [ -n "$previous_tag" ]; then
          metadata_args+=(--previous-tag "$previous_tag")
        fi
        python .tooling/scripts/release_metadata.py "${metadata_args[@]}" --root .

        mapfile -d '' assets < <(find dist/publish -type f -print0)
        if [ "${#assets[@]}" -ne 4 ]; then
          echo "expected four validated desktop artifacts, found ${#assets[@]}" >&2
          exit 1
        fi

        # Re-read both authoritative sources immediately before the atomic API call.
        fresh_remote_tags="$(git ls-remote --tags origin 'refs/tags/v0.2.0-alpha.*' | while read -r _ ref; do
          tag="${ref#refs/tags/}"
          printf '%s\n' "${tag%^{}}"
        done | sort -u)"
        fresh_release_tags="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
          --jq '.[] | select(.draft == false) | .tag_name')"
        fresh_build="$(printf '%s\n%s\n' "$fresh_remote_tags" "$fresh_release_tags" | \
          python .tooling/scripts/release_policy.py next-build)"
        if [ "$fresh_build" != "$build_number" ]; then
          echo "prerelease sequence changed during publication; retry in a new run" >&2
          exit 1
        fi
        if printf '%s\n%s\n' "$fresh_remote_tags" "$fresh_release_tags" | grep -Fqx "$release_tag"; then
          echo "candidate tag appeared during publication: ${release_tag}" >&2
          exit 1
        fi
        gh release create "$release_tag" "${assets[@]}" --target "$TARGET_SHA" \
          --title "${RELEASE_VERSION}.${build_number}" --notes-file release-notes.md \
          --prerelease
